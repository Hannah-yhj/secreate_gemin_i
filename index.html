<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 지시서 — 결제 직전, 뭘 꺼낼지 알려드려요</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <!-- 왼쪽 사이드바 (웹 기본: 고정 / 모바일: 드로어) -->
  <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
  <aside class="sidebar" id="drawer" aria-label="주요 메뉴">
    <div class="sidebar-brand">
      <h1>결제 <span class="hl">지시서</span></h1>
      <p>결제 직전, 뭘 꺼낼지 한 번에</p>
      <button type="button" class="drawer-close" id="drawerClose" aria-label="메뉴 닫기">✕</button>
    </div>
    <nav class="drawer-nav">
      <button type="button" data-page="mypage" class="on">
        <span class="nav-ico">👤</span>
        <span>
          <b>마이페이지</b>
          <small>로그인 · 카드 관리</small>
        </span>
      </button>
      <button type="button" data-page="benefits">
        <span class="nav-ico">✨</span>
        <span>
          <b>혜택 추천</b>
          <small>지도 · 결제 계산</small>
        </span>
      </button>
      <button type="button" data-page="more">
        <span class="nav-ico">💬</span>
        <span>
          <b>추가 기능</b>
          <small>카드 추천 챗봇</small>
        </span>
      </button>
    </nav>
    <div class="sidebar-foot">
      <span class="date" id="todayLabel"></span>
    </div>
  </aside>

  <div class="shell">
    <header class="topbar">
      <button type="button" class="menu-btn" id="menuBtn" aria-label="메뉴 열기" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <div class="brand">
        <h1 class="top-title">결제 <span class="hl">지시서</span></h1>
        <p class="tagline">결제 직전, 지갑에서 뭘 꺼낼지 한 번에 정해 드려요.</p>
      </div>
    </header>
    <main id="main"></main>
  </div>
</div>

<script src="app.js"></script>
<script src="ui.js"></script>
</body>
</html>
