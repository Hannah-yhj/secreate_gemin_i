<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>브랜드/매장 관리</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/jsoneditor/9.10.2/jsoneditor.min.css" rel="stylesheet" type="text/css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .status-badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.85em;
      font-weight: bold;
    }
    .status-pending_review { background: #ffebee; color: #c62828; }
    .status-approved { background: #e8f5e9; color: #2e7d32; }
    .status-rejected { background: #eeeeee; color: #616161; }
    
    .merchant-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <header class="admin-header">
      <div class="header-content">
        <h1>Admin Dashboard <span class="badge">BETA</span></h1>
        
        <nav class="admin-gnb">
          <a href="index.html" class="gnb-link">결제수단 관리</a>
          <a href="merchant.html" class="gnb-link active">브랜드/매장 관리</a>
          <a href="anomaly.html" class="gnb-link">혜택 이상탐지</a>
        </nav>
        
        <div id="authPanel" class="auth-panel"></div>
      </div>
    </header>
    
    <main class="admin-main">
      <section class="dashboard-view">
        <div class="merchant-container glass-panel">
          <h2>브랜드/매장 관리 큐</h2>
          
          <div class="tabs" style="margin-bottom: 12px;">
            <button class="tab-btn active" data-status="pending_review">검토 대기</button>
            <button class="tab-btn" data-status="approved">정규화 사전</button>
            <button class="tab-btn" data-status="rejected">거절됨</button>
          </div>
          
          <div class="filters" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 8px; border: 1px solid #333;">
            <div style="display: flex; gap: 8px; align-items: center;">
              <svg width="16" height="16" fill="none" stroke="#888" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
              <input type="text" id="searchInput" placeholder="가맹점명 또는 대표명 검색..." style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #222; color: white;">
            </div>
            <div id="categoryChips" style="display: flex; gap: 8px; flex-wrap: wrap;">
              <button class="chip active" data-category="전체" style="padding: 4px 12px; border-radius: 16px; border: 1px solid #555; background: #333; color: white; cursor: pointer; font-size: 0.85em;">전체</button>
              <button class="chip" data-category="외식" style="padding: 4px 12px; border-radius: 16px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; font-size: 0.85em;">외식</button>
              <button class="chip" data-category="카페/베이커리" style="padding: 4px 12px; border-radius: 16px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; font-size: 0.85em;">카페/베이커리</button>
              <button class="chip" data-category="쇼핑" style="padding: 4px 12px; border-radius: 16px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; font-size: 0.85em;">쇼핑</button>
              <button class="chip" data-category="배달" style="padding: 4px 12px; border-radius: 16px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; font-size: 0.85em;">배달</button>
              <button class="chip" data-category="마트/편의점" style="padding: 4px 12px; border-radius: 16px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; font-size: 0.85em;">마트/편의점</button>
              <button class="chip" data-category="교통" style="padding: 4px 12px; border-radius: 16px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; font-size: 0.85em;">교통</button>
              <button class="chip" data-category="주유/차량" style="padding: 4px 12px; border-radius: 16px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; font-size: 0.85em;">주유/차량</button>
              <button class="chip" data-category="기타" style="padding: 4px 12px; border-radius: 16px; border: 1px solid #555; background: transparent; color: #aaa; cursor: pointer; font-size: 0.85em;">기타 등</button>
            </div>
          </div>

          <div class="content-box" style="margin-top: 20px;">
            <ul class="queue-list" id="merchant-list">
              <!-- JS will populate -->
            </ul>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="merchant.js"></script>
</body>
</html>
