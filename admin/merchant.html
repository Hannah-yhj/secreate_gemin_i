<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가맹점 사전 검토 - 결제수단 큐 시스템</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="../supabase.js"></script>
  <script src="merchant.js" defer></script>
</head>
<body>
  <div class="admin-container">
    <header class="admin-header">
      <div class="header-content">
        <h1>Admin Dashboard <span class="badge">BETA</span></h1>
        <div id="authPanel" class="auth-panel">
          <!-- Auth state injected by JS -->
        </div>
      </div>
      <nav class="admin-nav" style="margin-top: 1rem; padding: 0.5rem 0; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 1rem;">
        <a href="index.html" style="color: #aaa; text-decoration: none; font-weight: 500; transition: color 0.2s;">결제수단 큐 관리</a>
        <a href="merchant.html" style="color: #60a5fa; text-decoration: none; font-weight: 500;">가맹점 사전 검토</a>
      </nav>
    </header>

    <main class="admin-main">
      <!-- Login View -->
      <section id="loginView" class="glass-panel login-view">
        <h2>관리자 로그인</h2>
        <p>허가된 관리자 계정으로 로그인해주세요.</p>
        <form id="loginForm" class="auth-form">
          <input type="email" id="adminEmail" placeholder="이메일" required />
          <input type="password" id="adminPassword" placeholder="비밀번호" required />
          <button type="submit" class="btn-primary">로그인</button>
        </form>
        <div id="loginError" class="error-text"></div>
      </section>

      <!-- Dashboard View -->
      <section id="dashboardView" class="dashboard-view" hidden>
        <div class="tabs">
          <button class="tab-btn active" data-target="pendingTab">대기 중 (검토 필요)</button>
          <button class="tab-btn" data-target="approvedTab">승인됨</button>
          <button class="tab-btn" data-target="rejectedTab">거절됨</button>
        </div>

        <div id="pendingTab" class="tab-content active glass-panel">
          <div class="tab-header">
            <h2>대기 중인 가맹점 명칭</h2>
            <button class="btn-secondary refresh-btn" data-status="pending_review">새로고침</button>
          </div>
          <p class="desc">AI가 확신하지 못한 가맹점 정규화 명칭들입니다. 관리자가 직접 승인하거나 수정 후 승인할 수 있습니다.</p>
          
          <div id="pendingList" class="queue-list">
            <div class="loading-state">데이터를 불러오는 중입니다...</div>
          </div>
        </div>

        <div id="approvedTab" class="tab-content glass-panel" hidden>
          <div class="tab-header">
            <h2>승인된 가맹점 명칭</h2>
            <button class="btn-secondary refresh-btn" data-status="approved">새로고침</button>
          </div>
          <p class="desc">정규화 사전으로 사용되고 있는 가맹점 명칭들입니다.</p>
          
          <div id="approvedList" class="queue-list">
            <div class="loading-state">데이터를 불러오는 중입니다...</div>
          </div>
        </div>

        <div id="rejectedTab" class="tab-content glass-panel" hidden>
          <div class="tab-header">
            <h2>거절된 가맹점 명칭</h2>
            <button class="btn-secondary refresh-btn" data-status="rejected">새로고침</button>
          </div>
          <p class="desc">잘못 추출되거나 무시된 명칭들입니다.</p>
          
          <div id="rejectedList" class="queue-list">
            <div class="loading-state">데이터를 불러오는 중입니다...</div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
