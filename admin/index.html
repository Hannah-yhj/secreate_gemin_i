<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드 - 카드 큐 시스템</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="../supabase.js"></script>
  <script src="admin.js" defer></script>
</head>
<body>
  <div class="admin-container">
    <header class="admin-header">
      <div class="header-content">
        <h1>Admin Dashboard <span class="badge">BETA</span></h1>
        <div id="authPanel" class="auth-panel">
          <!-- Auth state injected by JS -->
        </div>
      </div>
    </header>

    <main class="admin-main">
      <!-- Login View -->
      <section id="loginView" class="glass-panel login-view">
        <h2>관리자 로그인</h2>
        <p>허가된 관리자 계정으로 로그인해주세요.</p>
        <form id="loginForm" class="auth-form">
          <input type="email" id="adminEmail" placeholder="이메일" required />
          <input type="password" id="adminPassword" placeholder="비밀번호" required />
          <button type="submit" class="btn-primary">로그인</button>
        </form>
        <div id="loginError" class="error-text"></div>
      </section>

      <!-- Dashboard View -->
      <section id="dashboardView" class="dashboard-view" hidden>
        <div class="tabs">
          <button class="tab-btn active" data-target="queueTab">크롤러 큐</button>
          <button class="tab-btn" data-target="userRequestTab">유저 요청 탭 (준비중)</button>
        </div>

        <div id="queueTab" class="tab-content active glass-panel">
          <div class="tab-header">
            <h2>대기 중인 신규 카드</h2>
            <button id="refreshQueueBtn" class="btn-secondary">새로고침</button>
          </div>
          <p class="desc">크롤러가 수집한 신규 카드를 확인하고 약관을 업로드해 AI 등록 파이프라인을 실행하세요.</p>
          
          <div id="queueList" class="queue-list">
            <!-- Queue items injected by JS -->
            <div class="loading-state">데이터를 불러오는 중입니다...</div>
          </div>
        </div>
        
        <div id="userRequestTab" class="tab-content glass-panel" hidden>
          <div class="tab-header">
            <h2>유저 카드 추가 요청</h2>
            <button id="refreshUserQueueBtn" class="btn-secondary">새로고침</button>
          </div>
          <p class="desc">유저가 신청한 카드 목록입니다. 누락된 약관이 있다면 직접 업로드하여 AI 파이프라인으로 넘기세요.</p>
          <div id="userQueueList" class="queue-list">
            <div class="loading-state">데이터를 불러오는 중입니다...</div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
